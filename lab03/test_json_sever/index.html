<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
    <title>Document</title>
</head>
<body>
    <button onclick="update()">CLICK</button>
<div class="container">
  <h2>Basic Table</h2>
  <table class="table">
    <thead>
      <tr>
        <th>ID</th>
        <th>NAME</th>
        <th>PRICE</th>
        <th>COLOR</th>
      </tr>
    </thead>
    <tbody>

    </tbody>
  </table>
</div>
<script>
    async function update() {
        const sever = await fetch("https://quiz.maivanmanh.site/products")
        const content = await sever.json()
        console.log(content)
        const result = content
        const tbody = document.querySelector("tbody")
        tbody.innerHTML = ""
        for (let i = 0; i < result.length; i++) {
            const row = document.createElement("tr")
            const td1 = document.createElement("td")
            const td2 = document.createElement("td")
            const td3 = document.createElement("td")
            const td4 = document.createElement("td")

            td1.innerHTML = result[i].id
            td2.innerHTML = result[i].name
            td3.innerHTML = result[i].price
            td4.innerHTML = result[i].color

            row.appendChild(td1)
            row.appendChild(td2)
            row.appendChild(td3)
            row.appendChild(td4)

            setTimeout(() => tbody.appendChild(row), 1000 * i)
        }
    }
</script>
</body>
</html>
