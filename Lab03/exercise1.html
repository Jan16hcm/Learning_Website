<!DOCTYPE html>
<html lang="en">
<head>
    <title>Đăng nhập</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</head>


<style>
</style>


<body>

<style>

    .errorMessage {
        opacity: 0;
        color: rgb(185, 0, 0);
        font-size: 14px;
        transition: opacity 1.5s ease-in-out;
    }
    .disappear {
        opacity: 0;
    }
    .appear {
        opacity: 1;
    }
</style>

<div class="container">
    <h3 class="mt-5 mb-3 text-center text-primary">User Login</h2>
    <div class="row justify-content-center">
        <div class="col-md-6">
            <form class="border p-3 rounded" method="post" action="">
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" class="form-control" id="email" placeholder="Enter email" name="email">
                </div>
                <div class="form-group">
                    <label for="pwd">Password:</label>
                    <input type="password" class="form-control" id="pwd" placeholder="Enter password" name="password">
                </div>
                <div class="errorMessage my-3">Please enter your email address.</div>
                <button class="btn btn-primary" type="submit" class="btn btn-default">Submit</button>
            </form>
        </div>
    </div>
</div>

<script>
    //Need email and password
    //Email needs to be valid
    //Password should have 6 characters
    const err= document.querySelector(".errorMessage")
    const email = document.getElementById("email")
    const pass = document.getElementById("pwd")
    const form = document.querySelector("form")
    
    function errorFields(txtError,field) {
        err.innerHTML=txtError
        err.classList.add("appear")
        field.focus()
        field.onclick = () => {
            err.classList.replace("appear","disappear")
        }
        
    }
    form.onsubmit = (e) => {
    const isEmptyEmail= email.value.trim().length===0
    const isEmptyPass= pass.value.trim().length===0
    if(isEmptyEmail && isEmptyPass) {
        console.log("epdebug")
        err.innerHTML="You need to fill both fields"
        err.classList.add("appear")
        email.focus()
        pass.focus()

        return false
    }
    if(email.value.trim().length===0) {
        e.preventDefault
        console.log(email.value)
        //console.log(email.textContent)
        errorFields("Your email is empty",email)
        console.log("edebug")
        return false
    }
    if(pass.value.trim().length===0) {
        errorFields("Your password is empty",pass)
        console.log("pdebug")
        return false
    }
    //console.log("This shouldn't work")
    return true
}
    

</script>


</body>
</html>
