<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Apple Products</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container-fluid mt-4">

  <h2 class="mb-3">Apple Products</h2>

  <!-- Load Button -->
  <button onclick="loadProducts()" id="loadBtn" class="btn btn-primary mb-3">
    Load Products
  </button>

  <!-- Products Table -->
  <table class="table table-striped table-bordered w-100">
    <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Price ($)</th>
        <th>Color</th>
      </tr>
    </thead>
    <tbody id="productsTableBody">
      <!-- Data will be inserted here -->
    </tbody>
  </table>

  <hr class="my-4">

  <!-- New Product Form -->
  <h3>Add New Product</h3>

  <form id="productForm" class="mt-3">

    <div class="row mb-3">
      <div class="col-md-2">
        <label class="form-label">ID</label>
        <input type="number" class="form-control" id="id" required>
      </div>

      <div class="col-md-4">
        <label class="form-label">Name</label>
        <input type="text" class="form-control" id="name" required>
      </div>

      <div class="col-md-3">
        <label class="form-label">Price</label>
        <input type="number" class="form-control" id="price" required>
      </div>

      <div class="col-md-3">
        <label class="form-label">Color</label>
        <input type="text" class="form-control" id="color" required>
      </div>
    </div>

    <button type="submit" class="btn btn-success">
      Submit Product
    </button>

  </form>

</div>

<!-- JavaScript -->
<script>

document.getElementById("loadBtn").addEventListener("click", loadProducts);

form.addEventListener("submit", async e => {
  e.preventDefault();
  
})

function displayProduct(product) {

}

async function loadProducts() {
  try {

    const response = await fetch("http://localhost:3000/products");
    const products = await response.json();

    const tableBody = document.getElementById("productsTableBody");
    tableBody.innerHTML = "";

    products.forEach(product => {
      const row = `
        <tr>
          <td>${product.id}</td>
          <td>${product.name}</td>
          <td>${product.price}</td>
          <td>${product.color}</td>
        </tr>
      `;
      tableBody.innerHTML += row;
    });

  } catch (error) {
    console.error("Error loading products:", error);
  }
}

</script>

</body>
</html>
