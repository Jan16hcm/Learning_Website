<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Products Table</title>
</head>
<body>

    <style>
        table{
            width: 100%;
            border-collapse: collapse;
        }

        h1{
            text-align: center;
        }

        th, td{
            padding: 15px;
            text-align: center;
            
        }
        th{
            background-color: rgb(165, 165, 165);
        }

        tr:nth-child(even){
            background-color: rgb(165, 165, 165);
        }

        tr:nth-child(even):hover{
            transition: 0.5s;
            background-color: yellow;
        }

        tr:hover{
            transition: 0.5s;
            background-color: yellow;
        }

    </style>


    <h1>Apple Products</h1>
    <table border="1">
        <thead>
            <tr>
                <th>Product</th>
                <th>Category</th>
                <th>Release Year</th>
                <th>Starting Price (USD)</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>iPhone 15</td>
                <td>Smartphone</td>
                <td>2023</td>
                <td>$799</td>
            </tr>
            <tr>
                <td>MacBook Pro</td>
                <td>Laptop</td>
                <td>2023</td>
                <td>$1999</td>
            </tr>
            <tr>
                <td>iPad Air</td>
                <td>Tablet</td>
                <td>2022</td>
                <td>$599</td>
            </tr>
            <tr>
                <td>Apple Watch Series 9</td>
                <td>Smartwatch</td>
                <td>2023</td>
                <td>$399</td>
            </tr>
            <tr>
                <td>AirPods Pro (2nd Gen)</td>
                <td>Earbuds</td>
                <td>2022</td>
                <td>$249</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
