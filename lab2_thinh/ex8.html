<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Ex8</title>
    <style>
        /** Gới ý màu
                + tiêu đề: #388e3c
                + Viền bảng: #b00c2d
                + Dòng header: #5f52ab
                + Lunch và lab: #ffefb3
                + Empty: #e0e0e0
         */
    </style>
</head>
<body>
    <style>

        h3{
            text-align: center;
            color: green;
            text-transform: uppercase;
            font-size: 25px;
        }


        table{
            margin: auto;
            border-collapse: collapse;
            border: 2px dashed
        }

        td{
            text-align: center;
            padding: 20px;
            border: 1px solid black;
        }

        tr:first-child{
            font-weight: bolder;
        }

        tr:first-child td:not(:nth-child(4)){
            background-color: blue;
            color: white;
        }
        tr:first-child td:nth-child(4){
            background-color: yellow
        }

        /*color labs*/

        tr:nth-child(3) td:nth-child(2){
            background-color: yellow;
        }

        tr:nth-child(6) td:nth-child(2){
            background-color: yellow;
        }

        tr:nth-child(7) td:nth-child(4){
            background-color: yellow;
        }

        /*coloring empty*/

        tr:nth-child(2) td:nth-child(4){
            background-color: gray;
        }
        tr:nth-child(8) td:nth-child(2){
            background-color: gray;
        }
        tr:nth-child(8) td:nth-child(3){
            background-color: gray;
        }
        

        tr td:first-child{
            font-weight: bold;
        }

    </style>

    <h3>student schedule</h3>
    <table border="1">
        <tbody>
            <tr>
                <td>Day/Period</td>
                <td>I</td>
                <td>II</td>
                <td rowspan="8">lunch</td>
                <td>III</td>
                <td>IV</td>
            </tr>
            <tr>
                <td>Monday</td>
                <td>Math</td>
                <td>Physics</td>
                <td colspan="2" rowspan="2"></td>
            </tr>
            <tr>
                <td>Tuesday</td>
                <td colspan="2">LAB</td>
            </tr>
            <tr>
                <td>Wednesday</td>
                <td>History</td>
                <td>Music</td>
                <td colspan="2">SEMINAR</td>
            </tr>
            <tr>
                <td>Thursday</td>
                <td>Physical Education</td>
                <td>Swimming</td>
                <td>Chemistry</td>
                <td>Biology</td>
            </tr>
            <tr>
                <td>Friday</td>
                <td colspan="2">LAB</td>
                <td>Geography</td>
                <td>Informatics</td>
            </tr>
            <tr>
                <td>Saturday</td>
                <td>Math</td>
                <td>Physics</td>
                <td colspan="2">LAB</td>
            </tr>
            <tr>
                <td>Sunday</td>
                <td colspan="2"></td>
                <td></td>
                <td>Homework</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
