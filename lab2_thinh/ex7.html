<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex7</title>
</head>
<body>

    <style>

        html, body {
    height: 100%;
    margin: 0;
}
        .containermain{
            display: grid;
            grid-template-columns: repeat(4,1fr);
            padding: 10px;
            box-sizing: border-box;
            
            width: 100vw;
            height: 100vh;
        }



        .cell-content{
            display: flex;
            background-color: rgb(0, 81, 255);
            border-radius: 8px;
            margin: 10px;
            padding: 20px;
            align-items: center;
            justify-content: center;

        }

    </style>

        <div class = "containermain">
            <p class = cell-content>Card 1</p>
            <p class = cell-content>Card 2</p>
            <p class = cell-content>Card 3</p>
            <p class = cell-content>Card 4</p>
            <p class = cell-content>Card 5</p>
            <p class = cell-content>Card 6</p>
            <p class = cell-content>Card 7</p>
            <p class = cell-content>Card 8</p>
            <p class = cell-content>Card 9</p>
            <p class = cell-content>Card 10</p>
            <p class = cell-content>Card 11</p>
            <p class = cell-content>Card 12</p>
        </div>

    
</body>
</html>
